name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_OPTIONS: --disable-warning=ExperimentalWarning

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install test command shims
        run: |
          mkdir -p "$RUNNER_TEMP/cc-launcher-bin"
          cat > "$RUNNER_TEMP/cc-launcher-bin/codex" <<'SHIM'
          #!/usr/bin/env bash
          exit 0
          SHIM
          cat > "$RUNNER_TEMP/cc-launcher-bin/claude" <<'SHIM'
          #!/usr/bin/env bash
          exit 0
          SHIM
          chmod +x "$RUNNER_TEMP/cc-launcher-bin/codex" "$RUNNER_TEMP/cc-launcher-bin/claude"
          echo "$RUNNER_TEMP/cc-launcher-bin" >> "$GITHUB_PATH"

      - name: Resolve version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "versioned_tgz=dist/cc-launcher-${VERSION}.tgz" >> "$GITHUB_OUTPUT"
          echo "stable_tgz=dist/cc-launcher.tgz" >> "$GITHUB_OUTPUT"

      - name: Run test suite
        run: npm test

      - name: Pack release tarballs
        run: node ./scripts/pack-release.js

      - name: Generate release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -vx "$TAG" | head -1 || true)

          {
            echo "## CC Launcher ${TAG}"
            echo
            echo "CLI launcher for Codex and Claude, backed by cc-switch."
            echo
            echo "### Install the latest package"
            echo
            echo '```bash'
            echo "npm install -g https://github.com/${{ github.repository }}/releases/latest/download/cc-launcher.tgz"
            echo '```'
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              echo
              git log "${PREV_TAG}..HEAD" --pretty=format:'- %s (%h)' --no-merges | head -50
            else
              echo "### Initial release"
            fi
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            "${{ steps.version.outputs.versioned_tgz }}" \
            "${{ steps.version.outputs.stable_tgz }}" \
            --repo "${{ github.repository }}" \
            --title "${TAG} — CC Launcher" \
            --notes-file release-notes.md \
            --latest

      - name: Summary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "### Release ${TAG} created" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest install: npm install -g https://github.com/${{ github.repository }}/releases/latest/download/cc-launcher.tgz" >> "$GITHUB_STEP_SUMMARY"
