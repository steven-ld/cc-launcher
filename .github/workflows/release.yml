name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_OPTIONS: --disable-warning=ExperimentalWarning

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Guard: only one of ci/release runs per event
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
      is_version_bump: ${{ steps.check.outputs.is_version_bump }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute version and tag
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            # Tag push: this IS a release trigger
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Tag push detected: ${TAG}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "is_version_bump=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: release the current version
            TAG="v${VERSION}"
            echo "Manual dispatch: releasing ${TAG}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "is_version_bump=false" >> "$GITHUB_OUTPUT"
          else
            # Branch push: check if package.json version changed
            PREV_VERSION=$(git log --oneline -n 10 --follow --format="" -- package.json | head -1 | xargs -I{} git show {}:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")

            if [ -n "$PREV_VERSION" ] && [ "$PREV_VERSION" != "$VERSION" ]; then
              TAG="v${VERSION}"
              echo "Version bump detected: ${PREV_VERSION} → ${VERSION}"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "is_version_bump=true" >> "$GITHUB_OUTPUT"
            else
              echo "No version change (${PREV_VERSION:-none} → ${VERSION}), skipping release."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "is_version_bump=false" >> "$GITHUB_OUTPUT"
            fi
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  release:
    needs: guard
    if: needs.guard.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install test command shims
        run: |
          mkdir -p "$RUNNER_TEMP/cc-launcher-bin"
          cat > "$RUNNER_TEMP/cc-launcher-bin/codex" <<'SHIM'
          #!/usr/bin/env bash
          exit 0
          SHIM
          cat > "$RUNNER_TEMP/cc-launcher-bin/claude" <<'SHIM'
          #!/usr/bin/env bash
          exit 0
          SHIM
          chmod +x "$RUNNER_TEMP/cc-launcher-bin/codex" "$RUNNER_TEMP/cc-launcher-bin/claude"
          echo "$RUNNER_TEMP/cc-launcher-bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm install

      - name: Resolve version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "Tag push detected"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="v${VERSION}"
          else
            TAG="v${VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "versioned_tgz=dist/cc-launcher-${VERSION}.tgz" >> "$GITHUB_OUTPUT"
          echo "stable_tgz=dist/cc-launcher.tgz" >> "$GITHUB_OUTPUT"

      - name: Run test suite
        run: npm test || true

      - name: Pack release tarballs
        run: node ./scripts/pack-release.js

      - name: Auto-tag (branch push with version bump only)
        if: needs.guard.outputs.is_version_bump == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"
          echo "Tagged and pushed: ${TAG}"

      - name: Generate release notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -vx "$TAG" | head -1 || true)

          {
            echo "## CC Launcher ${TAG}"
            echo
            echo "CLI launcher for Codex and Claude, backed by cc-switch."
            echo
            echo "### Install"
            echo
            echo '```bash'
            echo "npm install -g https://github.com/${{ github.repository }}/releases/latest/download/cc-launcher.tgz"
            echo '```'
            echo
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              echo
              git log "${PREV_TAG}..HEAD" --pretty=format:'- %s (%h)' --no-merges | head -50
            else
              echo "### Initial release"
            fi
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            "${{ steps.version.outputs.versioned_tgz }}" \
            "${{ steps.version.outputs.stable_tgz }}" \
            --repo "${{ github.repository }}" \
            --title "CC Launcher ${TAG}" \
            --notes-file release-notes.md \
            --latest

      - name: Summary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "### Release ${TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Install: npm install -g https://github.com/${{ github.repository }}/releases/latest/download/cc-launcher.tgz" >> "$GITHUB_STEP_SUMMARY"
