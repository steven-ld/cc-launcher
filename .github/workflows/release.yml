name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME:-v${VERSION}}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "versioned_tgz=dist/cc-launcher-${VERSION}.tgz" >> "$GITHUB_OUTPUT"
          echo "stable_tgz=dist/cc-launcher.tgz" >> "$GITHUB_OUTPUT"

      - name: Run test suite
        run: npm test

      - name: Pack release tarballs
        run: node ./scripts/pack-release.js

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -vx "$TAG" | head -1 || true)

          {
            echo 'body<<NOTES_EOF'
            echo "## CC Launcher ${TAG}"
            echo ""
            echo "CLI launcher for Codex and Claude, backed by cc-switch."
            echo ""
            echo "### Install the latest package"
            echo ""
            echo '```bash'
            echo "npm install -g https://github.com/${{ github.repository }}/releases/latest/download/cc-launcher.tgz"
            echo '```'
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              echo ""
              git log "${PREV_TAG}..HEAD" --pretty=format:'- %s (%h)' --no-merges | head -50
            else
              echo "### Initial release"
            fi
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            "${{ steps.version.outputs.versioned_tgz }}" \
            "${{ steps.version.outputs.stable_tgz }}" \
            --repo "${{ github.repository }}" \
            --title "${TAG} — CC Launcher" \
            --notes "${{ steps.notes.outputs.body }}" \
            --latest

      - name: Summary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "### Release ${TAG} created" >> "$GITHUB_STEP_SUMMARY"
          echo "- Latest install: npm install -g https://github.com/${{ github.repository }}/releases/latest/download/cc-launcher.tgz" >> "$GITHUB_STEP_SUMMARY"
