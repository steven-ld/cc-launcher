name: CI

on:
  pull_request:

# CI only runs on PRs. Release workflow handles master branch pushes.
env:
  NODE_OPTIONS: --disable-warning=ExperimentalWarning

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install test command shims
        run: |
          mkdir -p "$RUNNER_TEMP/cc-launcher-bin"
          cat > "$RUNNER_TEMP/cc-launcher-bin/codex" <<'SHIM'
          #!/usr/bin/env bash
          exit 0
          SHIM
          cat > "$RUNNER_TEMP/cc-launcher-bin/claude" <<'SHIM'
          #!/usr/bin/env bash
          exit 0
          SHIM
          chmod +x "$RUNNER_TEMP/cc-launcher-bin/codex" "$RUNNER_TEMP/cc-launcher-bin/claude"
          echo "$RUNNER_TEMP/cc-launcher-bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm install

      - name: Run test suite
        run: npm test
