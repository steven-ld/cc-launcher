name: CI

on:
  pull_request:

env:
  NODE_OPTIONS: --disable-warning=ExperimentalWarning

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['22', '23']
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install shims
        run: |
          mkdir -p "$RUNNER_TEMP/cc-launcher-bin"
          printf '%s\n' '#!/usr/bin/env bash' 'exit 0' > "$RUNNER_TEMP/cc-launcher-bin/codex"
          printf '%s\n' '#!/usr/bin/env bash' 'exit 0' > "$RUNNER_TEMP/cc-launcher-bin/claude"
          chmod +x "$RUNNER_TEMP/cc-launcher-bin/codex" "$RUNNER_TEMP/cc-launcher-bin/claude"
          echo "$RUNNER_TEMP/cc-launcher-bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Check license
        run: |
          # Ensure LICENSE file exists
          if [ ! -f LICENSE ]; then
            echo "ERROR: LICENSE file is missing"
            exit 1
          fi
